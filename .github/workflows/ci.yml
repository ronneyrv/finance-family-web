name: Frontend CI

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run lint
        run: npm run lint

      - name: Build application
        run: npm run build
